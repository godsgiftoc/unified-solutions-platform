# Dev topology for the Unified Solutions Platform.
# Brings up the backing services; api/worker/frontend run locally during dev
# (or uncomment their service blocks to run fully containerized).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${USP_POSTGRES_USER:-usp}
      POSTGRES_PASSWORD: ${USP_POSTGRES_PASSWORD:-usp}
      POSTGRES_DB: ${USP_POSTGRES_DB:-usp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USP_POSTGRES_USER:-usp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${USP_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${USP_S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the default bucket on startup so the app has somewhere to land data.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${USP_S3_ACCESS_KEY:-minioadmin} ${USP_S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${USP_S3_BUCKET:-usp-data} &&
      echo 'bucket ready';
      "

volumes:
  pgdata:
  miniodata:
